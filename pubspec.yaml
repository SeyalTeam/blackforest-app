name: blackforest_app
description: "blackforest_stockorder"
publish_to: "none"

version: 2.0.0+2

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.2
  package_info_plus: ^8.0.0
  provider: ^6.1.2
  mobile_scanner: ^5.1.1
  cached_network_image: ^3.4.1
  esc_pos_printer: ^4.1.0
  esc_pos_utils: ^1.1.0
  network_info_plus: ^4.0.2
  camera: ^0.10.6 # For live camera capture
  permission_handler: ^11.3.1 # For requesting camera permissions
  image: ^3.3.0 # For image compression
  path_provider: ^2.1.3 # For temp file storage
  intl: ^0.18.1
  qr: ^3.0.1
  audioplayers: ^6.0.0
  geolocator: ^14.0.2
  connectivity_plus: ^7.0.0
  flutter_local_notifications: ^20.0.0
  print_bluetooth_thermal: ^1.1.7
  flutter_foreground_task: ^9.2.1
  screen_protector: ^1.5.2
  flutter_cashfree_pg_sdk: ^2.4.0+52



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/sounds/
    - assets/sounds/table.mp3
    - assets/sounds/pay.mp3
    - assets/sounds/order.wav
